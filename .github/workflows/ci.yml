name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Guard against committed cache dirs (PII)
        shell: bash
        run: |
          hits=$(git ls-files -- '*_cache/*')
          if [ -n "$hits" ]; then
            echo "::error::Cache directories must never be committed — they hold fetched candidate data (PII). See issue #16. Tracked cache files:"
            echo "$hits"
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        shell: bash
        run: |
          set +e
          pytest
          code=$?
          # Exit code 5 == "no tests were collected"; tolerate it while the suite is still being built.
          if [ "$code" -eq 5 ]; then
            echo "::notice::pytest collected no tests (exit 5) — treating as success"
            exit 0
          fi
          exit $code
